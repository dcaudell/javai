## Pre-work for the Embedding Generation deployment described in the whitepaper's §4.5 ("Embedding
## Generation") and doc/spec/vector-core.md's JavAIEmbeddingProvider SPI. Nothing in javai-runtime talks
## to this yet -- JavAIEmbeddingProvider's Phase 0 HTTP client hasn't been written. This compose file is
## the deployment target that client will be built against: Hugging Face's text-embeddings-inference
## (TEI) as a sidecar container, never a bespoke Python/PyTorch serving process (§4.5.2's "depend on,
## don't build" posture), reachable at an identical REST API regardless of which profile is running
## behind it (§4.5.2's "one model file, one SPI, three deployment shapes").
##
## Usage:
##   cp .env.example .env   # fill in JAVAI_EMBEDDING_MODEL_REVISION -- see .env.example and README.md
##   docker compose --profile cpu up    # Phase 0 baseline: CPU-only, no GPU required (whitepaper §9.1)
##   docker compose --profile cuda up   # NVIDIA GPU acceleration -- same model, same API, just faster
##
## Apple Silicon/Metal has no profile here: Docker Desktop cannot pass a Metal GPU through to a
## container, so TEI's metal image isn't usable this way. Run `text-embeddings-router` natively on macOS
## instead for local dev acceleration -- see README.md.
##
## `--profile ollama` is not one of the whitepaper's three deployment shapes -- it's a workaround for a
## confirmed, unresolved bug in TEI's Candle backend running Qwen3-Embedding-0.6B on CPU at all (see
## README.md). Needs javai-runtime's OllamaEmbeddingProvider on the client side, not
## TextEmbeddingsInferenceProvider -- the REST contract is different.
##
## `--profile postgres` / `--profile neo4j` are javai-persistence's (Persistence Bridge) two backends --
## see doc/spec/persistence-bridge.md and javai-persistence/README.md. Additive, not alternatives like the
## embedding profiles above: both can run at once, and either can run alongside any embedding profile.
##   docker compose --profile postgres up   # Postgres 16 + pgvector, port 5432
##   docker compose --profile neo4j up      # Neo4j 5.26 Community, ports 7474 (HTTP)/7687 (Bolt)
## Ports are each service's own long-standing standard default -- 5432, 7474, 7687 -- deliberately nowhere
## near the embedding ports already in use here (8080 TEI, 11434 Ollama) or any port a typical local
## LLM-serving sidecar would claim, so a future Completion Fabric container has nothing to collide with.

services:
  javai-embeddings-cpu:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    profiles: ["cpu"]
    command:
      - "--model-id=${JAVAI_EMBEDDING_MODEL_ID:-Qwen/Qwen3-Embedding-0.6B}"
      - "--revision=${JAVAI_EMBEDDING_MODEL_REVISION:?set JAVAI_EMBEDDING_MODEL_REVISION in .env -- pin a model revision, do not float on a branch}"
    ports:
      - "${JAVAI_EMBEDDING_PORT:-8080}:80"
    volumes:
      - ./data/embeddings-cache:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  javai-embeddings-cuda:
    image: ghcr.io/huggingface/text-embeddings-inference:cuda-1.9
    profiles: ["cuda"]
    command:
      - "--model-id=${JAVAI_EMBEDDING_MODEL_ID:-Qwen/Qwen3-Embedding-0.6B}"
      - "--revision=${JAVAI_EMBEDDING_MODEL_REVISION:?set JAVAI_EMBEDDING_MODEL_REVISION in .env -- pin a model revision, do not float on a branch}"
    ports:
      - "${JAVAI_EMBEDDING_PORT:-8080}:80"
    volumes:
      - ./data/embeddings-cache:/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: ["gpu"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  javai-embeddings-ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    ports:
      - "${JAVAI_EMBEDDING_PORT:-11434}:11434"
    volumes:
      - ./data/ollama-cache:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Ollama has no --model-id-at-startup flag like TEI's; pull the model once after the container is up:
    #   docker compose --profile ollama up -d
    #   docker compose exec javai-embeddings-ollama ollama pull qwen3-embedding:0.6b

  javai-postgres:
    image: pgvector/pgvector:pg16
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: javai
      POSTGRES_USER: ${JAVAI_POSTGRES_USER:-javai}
      POSTGRES_PASSWORD: ${JAVAI_POSTGRES_PASSWORD:-javai}
    ports:
      - "${JAVAI_POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${JAVAI_POSTGRES_USER:-javai} -d javai"]
      interval: 10s
      timeout: 5s
      retries: 5

  javai-neo4j:
    image: neo4j:5.26-community
    profiles: ["neo4j"]
    environment:
      NEO4J_AUTH: neo4j/${JAVAI_NEO4J_PASSWORD:-javai12345}
    ports:
      - "${JAVAI_NEO4J_HTTP_PORT:-7474}:7474"
      - "${JAVAI_NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - ./data/neo4j:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  ## Uncomment once a javai-app image exists to build against this sidecar directly, per the whitepaper's
  ## own compose example (§4.5.2, Example 14):
  # javai-app:
  #   build: ..
  #   environment:
  #     JAVAI_EMBEDDING_ENDPOINT: http://javai-embeddings-cpu:80
  #     JAVAI_EMBEDDING_MODEL: qwen3-embedding-0.6b
  #   depends_on:
  #     - javai-embeddings-cpu
