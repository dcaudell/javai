name: Publish to Maven Central

# Triggered by pushing a version tag (e.g. `v0.1.0`) -- the standard convention this project follows is:
# merge the Dev -> main PR (which already ran ci.yml's release-readiness job), then tag main at the merge
# commit. This workflow does the actual signed, published build. See doc/release-process.md for the full
# walkthrough, including the one-time account/GPG setup this workflow's secrets depend on.
#
# Gated behind the "maven-central-release" GitHub Environment, which must be configured (Settings ->
# Environments) with at least one required reviewer -- that's what turns "push a tag" into "push a tag,
# then a human explicitly clicks approve" for this specific, hard-to-reverse action. See
# doc/release-process.md for exactly how to set that up; this workflow cannot configure it itself.
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write # only used to create the GitHub Release after a successful publish

jobs:
  publish:
    name: Build, sign, and publish
    runs-on: ubuntu-latest
    environment:
      name: maven-central-release
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '26'
          cache: maven
          # setup-java's own Central-publishing support: writes ~/.m2/settings.xml with a <server id="central">
          # block (username/password pulled from the two env vars below at deploy time, not written to disk
          # in plaintext) and imports the GPG private key, wiring MAVEN_GPG_PASSPHRASE for maven-gpg-plugin to
          # read. See doc/release-process.md for exactly which secrets these five names map to and how to
          # create each one -- none of them exist until that walkthrough is followed.
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Verify the tag matches the POM version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          POM_VERSION=$(mvn -q help:evaluate -Dexpression=project.version -DforceStdout)
          echo "Tag version: $TAG_VERSION -- POM version: $POM_VERSION"
          if [[ "$TAG_VERSION" != "$POM_VERSION" ]]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match the POM version ($POM_VERSION) -- refusing to publish."
            exit 1
          fi
          if [[ "$POM_VERSION" == *-SNAPSHOT ]]; then
            echo "::error::Refusing to publish a SNAPSHOT version ($POM_VERSION)."
            exit 1
          fi

      - name: mvn -Prelease deploy (full test suite, then build+sign+publish)
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: mvn -B -ntp -Prelease deploy
        # Runs the same test scope as ci.yml (performance/requires-model tests still excluded by default --
        # see the root pom.xml) as one last check before an irreversible action, then builds every module's
        # jar/sources/javadoc, signs all of them, and uploads a release bundle to the Central Portal.
        # autoPublish is false in the release profile, so this stops at "uploaded, awaiting one more manual
        # click" in Central's own web UI -- see doc/release-process.md for that last step.

      - name: Create a GitHub Release for this tag
        run: gh release create "${GITHUB_REF_NAME}" --generate-notes --title "${GITHUB_REF_NAME}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
